name: Publish npm package

on:
  release:
    types: [published]


jobs:
  publish-npm:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:

    - uses: actions/checkout@v6

    - uses: actions/setup-node@v6
      with:
        # Node 24 ships with npm 11.x which supports trusted publishing
        # out of the box. Using it directly sidesteps the broken
        # `npm install -g npm@...` self-upgrade path on node 22 runners
        # (MODULE_NOT_FOUND: promise-retry inside @npmcli/arborist).
        node-version: '24.x'
        registry-url: 'https://registry.npmjs.org'

    - uses: oven-sh/setup-bun@v2
      with:
        bun-version: '1.3.14'

    - name: Resolve release tag
      run: |
        echo "RELEASE_TAG=${GITHUB_REF_NAME}" >> $GITHUB_ENV

    - name: Set package.json version from tag
      run: npm version --no-git-tag-version --allow-same-version "${RELEASE_TAG#v}"

    - name: Install dependencies
      run: bun install --frozen-lockfile

    - name: Build
      run: bun run build

    - name: Publish to npm
      run: npm publish --provenance --access public
